<html lang="en">

    <script>

        location.replace("https://" + location.host + location.pathname + location.search + location.hash);
      }
    </script>

    <meta property="og:type" content="website" />

    <link rel="alternate" type="application/rss+xml" title="Jin’s Latent Space" href="/feed.xml" />
    <link rel="icon" type="image/svg+xml" href="/icons/jindai-mustard.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/jindai-32-mustard.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icons/jindai-512-mustard.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Mona+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css?v=13" />
    <script>
      (function () {
        const saved = localStorage.getItem("theme");
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        if (saved === "dark" || (!saved && prefersDark)) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
  </head>
  <body>
    <header>
      <div class="wrap">
        <div class="header-top">
          <h1 class="site-name"><a href="/"><img class="site-logo site-logo-light" src="/icons/jindai-512-inverted.png" alt="" width="44" height="44" /><img class="site-logo site-logo-dark" src="/icons/jindai-512-mustard.png" alt="" width="44" height="44" /><span class="site-words"><span class="site-name-text">Jin’s Latent Space</span><span class="site-tagline">A quiet workshop for ideas, in slow drafts.</span></span></a></h1>
          <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
            <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
            <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
          </button>
        </div>
        <hr class="rule" style="margin-top: 20px;" />
        <nav aria-label="Primary">
          <a href="/">Blog</a>
          <a href="/archive.html">All Posts</a>
          <a href="/search.html" aria-current="page">Search</a>
          <a href="/about.html">About</a>
          <a href="/colophon.html">Colophon</a>
        </nav>
        <hr class="rule" style="margin-top: 0;" />
      </div>
    </header>

    <main>
      <div class="wrap">
        <section class="search-shell">
          <form class="search-form" id="search-form" role="search" autocomplete="off">
            <label class="search-label visually-hidden" for="search-input">Search posts</label>
            <div class="search-input-row">
              <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
              <input
                id="search-input"
                class="search-input"
                type="search"
                name="q"
                placeholder="Type to search…"
                inputmode="search"
                spellcheck="false"
              />
              <button type="button" class="search-clear" id="search-clear" hidden>&times;</button>
            </div>
          </form>

          <section class="search-results" id="search-results" aria-live="polite"></section>
        </section>
      </div>
    </main>

    <footer>
      <div class="wrap">
        <div class="footer-inner">
          <span>&copy; 2026 Jin Dai</span>
          <span class="footer-links">
            <a href="https://github.com/poorjin" target="_blank" rel="noopener">GitHub</a>
            <a href="mailto:jindaidx@gmail.com">Email</a>
            <a href="/feed.xml">RSS</a>
            <a href="/colophon.html">Colophon</a>
          </span>
        </div>
      </div>
    </footer>

    <script src="/search.js"></script>
  </body>
</html>
